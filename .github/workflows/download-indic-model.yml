name: Download IndicConformer CTC Model

on:
  workflow_dispatch:
    inputs:
      hf_token:
        description: 'HuggingFace Read Token (hf_...)'
        required: true
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download CTC model files from HuggingFace
        env:
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
        run: |
          python3 << 'PYEOF'
          from huggingface_hub import hf_hub_download, list_repo_files
          import os, shutil

          token = os.environ['HF_TOKEN']
          repo  = 'ai4bharat/indic-conformer-600m-multilingual'
          out   = 'indic_ctc'
          os.makedirs(out, exist_ok=True)

          core = [
              'assets/encoder.onnx',
              'assets/Constant_1970_attr__value',
              'assets/ctc_decoder.onnx',
              'assets/language_masks.json',
          ]
          all_files   = list(list_repo_files(repo, token=token))
          layer_files = [f for f in all_files if f.startswith('assets/layers.')]
          print(f'Found {len(layer_files)} layer weight files')

          for f in core + layer_files:
              name = f.split('/')[-1]
              print(f'Downloading {name}...')
              # hf_hub_download returns the actual local path
              local_path = hf_hub_download(
                  repo, f, token=token,
                  local_dir='/tmp/hf_cache',
                  local_dir_use_symlinks=False
              )
              # Copy to flat output dir
              dst = os.path.join(out, name)
              shutil.copy2(local_path, dst)
              size = os.path.getsize(dst)
              print(f'  -> {size/1024/1024:.1f} MB saved as {name}')

          files = os.listdir(out)
          total = sum(os.path.getsize(os.path.join(out, f)) for f in files)
          print(f'Done: {total/1024/1024:.0f} MB in {len(files)} files')
          PYEOF

      - name: List downloaded files
        run: ls -lh indic_ctc/

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: indic-ctc-v1
          name: IndicConformer CTC Model v1
          body: |
            IndicConformer 600M multilingual CTC model files for Scrivox.
            Covers all 22 Indian languages. MIT License (AI4Bharat).
          files: indic_ctc/*
          token: ${{ secrets.GITHUB_TOKEN }}
