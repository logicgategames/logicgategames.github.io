name: Export Indian Whisper ONNX

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language code: te | hi | ta | kn | ml | bn | mr | gu'
        required: true
        default: 'te'
      model_size:
        description: 'Model size: tiny | base | small | medium | large-v2'
        required: true
        default: 'base'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install transformers torch onnx onnxruntime huggingface_hub

      - name: Map language code to full name
        id: lang
        run: |
          CODE="${{ inputs.language }}"
          SIZE="${{ inputs.model_size }}"
          case "$CODE" in
            te) NAME="telugu"    ;;
            hi) NAME="hindi"     ;;
            ta) NAME="tamil"     ;;
            kn) NAME="kannada"   ;;
            ml) NAME="malayalam" ;;
            bn) NAME="bengali"   ;;
            mr) NAME="marathi"   ;;
            gu) NAME="gujarati"  ;;
            pa) NAME="punjabi"   ;;
            ur) NAME="urdu"      ;;
            *)  NAME="$CODE"     ;;
          esac
          MODEL="vasista22/whisper-${NAME}-${SIZE}"
          TAG="whisper-${CODE}-${SIZE}-v2"
          OUT="./out"
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
          echo "out=$OUT"     >> $GITHUB_OUTPUT
          echo "name=$NAME"   >> $GITHUB_OUTPUT
          echo "Exporting: $MODEL"

      - name: Weight surgery - inject Telugu weights into working ONNX architecture
        env:
          MODEL: ${{ steps.lang.outputs.model }}
          OUT_DIR: ${{ steps.lang.outputs.out }}
        run: |
          python3 << 'PYEOF'
          import os, numpy as np, onnx
          from onnx import numpy_helper
          from transformers import WhisperForConditionalGeneration, WhisperProcessor
          from huggingface_hub import hf_hub_download

          model_id = os.environ["MODEL"]
          out_dir  = os.environ["OUT_DIR"]
          os.makedirs(out_dir, exist_ok=True)

          # Step 1: Download onnx-community/whisper-base ONNX files
          # These are the exact files that already work with WhisperOnnxEngine.
          # vasista22 fine-tunes share the same architecture — we just swap weights.
          print("Downloading onnx-community/whisper-base ONNX architecture...")
          enc_src = hf_hub_download("onnx-community/whisper-base", "onnx/encoder_model.onnx")
          dec_src = hf_hub_download("onnx-community/whisper-base", "onnx/decoder_model.onnx")
          print(f"  encoder: {os.path.getsize(enc_src)/1e6:.1f} MB")
          print(f"  decoder: {os.path.getsize(dec_src)/1e6:.1f} MB")

          # Step 2: Load vasista22 Telugu fine-tuned weights
          print(f"Loading {model_id} weights...")
          pt_model = WhisperForConditionalGeneration.from_pretrained(model_id)
          state = {k: v.detach().float().numpy() for k, v in pt_model.state_dict().items()}
          print(f"  {len(state)} weight tensors loaded")
          del pt_model  # free memory

          # Step 3: Inject weights into encoder ONNX
          print("Injecting weights into encoder...")
          enc = onnx.load(enc_src)
          # Diagnostic: show name format comparison
          onnx_names = [i.name for i in enc.graph.initializer[:5]]
          pt_names   = list(state.keys())[:5]
          print(f"  ONNX initializer names (first 5): {onnx_names}")
          print(f"  PyTorch state dict keys  (first 5): {pt_names}")
          enc_updated = 0
          for init in enc.graph.initializer:
              if init.name in state and init.data_type == onnx.TensorProto.FLOAT:
                  arr = state[init.name]
                  # Verify shapes match
                  onnx_shape = tuple(d for d in init.dims)
                  if arr.shape == onnx_shape:
                      init.CopyFrom(numpy_helper.from_array(arr, name=init.name))
                      enc_updated += 1
          print(f"  Updated {enc_updated}/{len(enc.graph.initializer)} encoder initializers")
          onnx.save(enc, f"{out_dir}/encoder_model.onnx")
          print(f"  Saved: {os.path.getsize(out_dir+'/encoder_model.onnx')/1e6:.1f} MB")
          del enc

          # Step 4: Inject weights into decoder ONNX
          print("Injecting weights into decoder...")
          dec = onnx.load(dec_src)
          dec_updated = 0
          for init in dec.graph.initializer:
              if init.name in state and init.data_type == onnx.TensorProto.FLOAT:
                  arr = state[init.name]
                  onnx_shape = tuple(d for d in init.dims)
                  if arr.shape == onnx_shape:
                      init.CopyFrom(numpy_helper.from_array(arr, name=init.name))
                      dec_updated += 1
          print(f"  Updated {dec_updated}/{len(dec.graph.initializer)} decoder initializers")
          onnx.save(dec, f"{out_dir}/decoder_model.onnx")
          print(f"  Saved: {os.path.getsize(out_dir+'/decoder_model.onnx')/1e6:.1f} MB")
          del dec

          # Step 5: Save vasista22 tokenizer (same as base Whisper but confirm)
          print("Saving tokenizer...")
          WhisperProcessor.from_pretrained(model_id).save_pretrained(out_dir)
          print("Weight surgery complete!")
          PYEOF

      - name: Quantize decoder to INT8
        env:
          OUT_DIR: ${{ steps.lang.outputs.out }}
        run: |
          python3 << 'PYEOF'
          import os
          from onnxruntime.quantization import quantize_dynamic, QuantType
          out = os.environ["OUT_DIR"]
          src = f"{out}/decoder_model.onnx"
          dst = f"{out}/decoder_model_int8.onnx"
          if os.path.exists(src):
              print(f"Quantizing {src}...")
              quantize_dynamic(src, dst, weight_type=QuantType.QInt8)
              a = os.path.getsize(src)/1e6
              b = os.path.getsize(dst)/1e6
              print(f"  {a:.0f} MB -> {b:.0f} MB (int8)")
          PYEOF

      - name: List final files
        run: ls -lh ${{ steps.lang.outputs.out }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.lang.outputs.tag }}
          name: "Indian Whisper - ${{ steps.lang.outputs.name }} (${{ inputs.model_size }}) v2"
          body: |
            Weight surgery: vasista22 Telugu weights in onnx-community/whisper-base architecture.
            Source: vasista22/whisper-${{ steps.lang.outputs.name }}-${{ inputs.model_size }}
          files: |
            ${{ steps.lang.outputs.out }}/encoder_model.onnx
            ${{ steps.lang.outputs.out }}/decoder_model_int8.onnx
            ${{ steps.lang.outputs.out }}/vocab.json
            ${{ steps.lang.outputs.out }}/added_tokens.json
