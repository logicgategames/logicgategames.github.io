name: Export Indian Whisper ONNX


on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language code: te | hi | ta | kn | ml | bn | mr | gu'
        required: true
        default: 'te'
      model_size:
        description: 'Model size: tiny | base | small | medium | large-v2'
        required: true
        default: 'base'


permissions:
  contents: write


jobs:
  export:
    runs-on: ubuntu-latest


    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h


      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'


      - name: Install dependencies
        run: pip install transformers torch onnx onnxruntime onnxscript


      - name: Map language code to full name
