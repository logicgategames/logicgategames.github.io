name: Export Indian Whisper ONNX

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language code: te | hi | ta | kn | ml | bn | mr | gu'
        required: true
        default: 'te'
      model_size:
        description: 'Model size: tiny | base | small | medium | large-v2'
        required: true
        default: 'base'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "optimum[onnxruntime]" transformers

      - name: Map language code to full name
        id: lang
        run: |
          CODE="${{ inputs.language }}"
          SIZE="${{ inputs.model_size }}"
          case "$CODE" in
            te) NAME="telugu"    ;;
            hi) NAME="hindi"     ;;
            ta) NAME="tamil"     ;;
            kn) NAME="kannada"   ;;
            ml) NAME="malayalam" ;;
            bn) NAME="bengali"   ;;
            mr) NAME="marathi"   ;;
            gu) NAME="gujarati"  ;;
            pa) NAME="punjabi"   ;;
            ur) NAME="urdu"      ;;
            *)  NAME="$CODE"     ;;
          esac
          MODEL="vasista22/whisper-${NAME}-${SIZE}"
          TAG="whisper-${CODE}-${SIZE}-v4"
          OUT="./out"
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
          echo "out=$OUT"     >> $GITHUB_OUTPUT
          echo "name=$NAME"   >> $GITHUB_OUTPUT
          echo "Exporting: $MODEL -> $TAG"

      - name: Export to ONNX (produces encoder + decoder + decoder_with_past)
        env:
          MODEL: ${{ steps.lang.outputs.model }}
          OUT_DIR: ${{ steps.lang.outputs.out }}
        run: |
          python3 << 'PYEOF'
          import os, glob
          from optimum.onnxruntime import ORTModelForSpeechSeq2Seq
          model_id = os.environ["MODEL"]
          out_dir  = os.environ["OUT_DIR"]
          os.makedirs(out_dir, exist_ok=True)
          print(f"Exporting {model_id}...")
          model = ORTModelForSpeechSeq2Seq.from_pretrained(
              model_id, export=True, use_cache=True
          )
          model.save_pretrained(out_dir)
          for f in sorted(glob.glob(f"{out_dir}/*.onnx")):
              print(f"  {os.path.basename(f)}: {os.path.getsize(f)/1e6:.1f} MB")
          PYEOF

      - name: Quantize decoders to INT8
        env:
          OUT_DIR: ${{ steps.lang.outputs.out }}
        run: |
          python3 << 'PYEOF'
          import os
          from onnxruntime.quantization import quantize_dynamic, QuantType

          out = os.environ["OUT_DIR"]
          for name in ["decoder_model", "decoder_with_past_model"]:
              src = f"{out}/{name}.onnx"
              dst = f"{out}/{name}_int8.onnx"
              if os.path.exists(src):
                  print(f"Quantizing {src}...")
                  quantize_dynamic(src, dst, weight_type=QuantType.QInt8)
                  a = os.path.getsize(src) / 1e6
                  b = os.path.getsize(dst) / 1e6
                  print(f"  {a:.0f} MB -> {b:.0f} MB (int8)")
              else:
                  print(f"  SKIP: {src} not found")
          PYEOF

      - name: List final files
        run: ls -lh ${{ steps.lang.outputs.out }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.lang.outputs.tag }}
          name: "Indian Whisper - ${{ steps.lang.outputs.name }} (${{ inputs.model_size }}) v4"
          body: |
            Direct optimum export from vasista22/whisper-${{ steps.lang.outputs.name }}-${{ inputs.model_size }}.
            Includes decoder_with_past_model for KV-cache inference.
          files: |
            ${{ steps.lang.outputs.out }}/encoder_model.onnx
            ${{ steps.lang.outputs.out }}/decoder_model_int8.onnx
            ${{ steps.lang.outputs.out }}/decoder_with_past_model_int8.onnx
            ${{ steps.lang.outputs.out }}/vocab.json
            ${{ steps.lang.outputs.out }}/added_tokens.json
