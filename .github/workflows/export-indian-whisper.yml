name: Export Indian Whisper ONNX

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language code: te | hi | ta | kn | ml | bn | mr | gu'
        required: true
        default: 'te'
      model_size:
        description: 'Model size: tiny | base | small | medium | large-v2'
        required: true
        default: 'base'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "optimum[exporters]" transformers torch onnxruntime onnx

      - name: Map language code to full name
        id: lang
        run: |
          CODE="${{ inputs.language }}"
          SIZE="${{ inputs.model_size }}"
          case "$CODE" in
            te) NAME="telugu"    ;;
            hi) NAME="hindi"     ;;
            ta) NAME="tamil"     ;;
            kn) NAME="kannada"   ;;
            ml) NAME="malayalam" ;;
            bn) NAME="bengali"   ;;
            mr) NAME="marathi"   ;;
            gu) NAME="gujarati"  ;;
            pa) NAME="punjabi"   ;;
            ur) NAME="urdu"      ;;
            *)  NAME="$CODE"     ;;
          esac
          MODEL="vasista22/whisper-${NAME}-${SIZE}"
          TAG="whisper-${CODE}-${SIZE}-v1"
          OUT="./out"
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
          echo "out=$OUT"     >> $GITHUB_OUTPUT
          echo "name=$NAME"   >> $GITHUB_OUTPUT
          echo "Exporting: $MODEL"

      - name: Export to ONNX
        run: |
          MODEL="${{ steps.lang.outputs.model }}"
          OUT="${{ steps.lang.outputs.out }}"
          python -m optimum.exporters.onnx \
            --model "$MODEL" \
            --task automatic-speech-recognition \
            "$OUT"
          echo "--- Exported files ---"
          ls -lh "$OUT"

      - name: Quantize decoder to INT8
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from onnxruntime.quantization import quantize_dynamic, QuantType
          out = "${{ steps.lang.outputs.out }}"
          src = f"{out}/decoder_model.onnx"
          dst = f"{out}/decoder_model_int8.onnx"
          if os.path.exists(src):
              print(f"Quantizing {src}...")
              quantize_dynamic(src, dst, weight_type=QuantType.QInt8)
              a = os.path.getsize(src)/1e6
              b = os.path.getsize(dst)/1e6
              print(f"  {a:.0f} MB -> {b:.0f} MB")
          else:
              print("No decoder_model.onnx found, skipping")
          PYEOF

      - name: Show final sizes
        run: ls -lh "${{ steps.lang.outputs.out }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.lang.outputs.tag }}
          name: "Indian Whisper - ${{ steps.lang.outputs.name }} (${{ inputs.model_size }})"
          body: |
            Source: vasista22/whisper-${{ steps.lang.outputs.name }}-${{ inputs.model_size }}
          files: |
            ${{ steps.lang.outputs.out }}/encoder_model.onnx
            ${{ steps.lang.outputs.out }}/decoder_model_int8.onnx
            ${{ steps.lang.outputs.out }}/vocab.json
            ${{ steps.lang.outputs.out }}/added_tokens.json
